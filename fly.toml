# Fly.io app config — todoleilao-soleon
#
# App "main": providers SaaS, sites próprios, bancos leves, geocoder.
# Caixa vive em app separado (`fly.caixa.toml`) por exigir VM maior.
#
# Schedules: orquestrados por GitHub Actions cron (.github/workflows/cron-*.yml).
# `fly machines run --schedule` não permite hora fixa — gh actions resolve.
#
# Ephemeral: cada workflow dispara `fly machines run --rm` que cria
# machine, executa, autodestrói. Cobra só por segundos rodando.
#
# Bootstrap:
#   fly secrets set \
#       SUPABASE_DB_URL='postgresql://...' \
#       CPF_PEPPER='098c9c941...' \
#       -a todoleilao-soleon
#   fly deploy -a todoleilao-soleon
#
# Smoke manual:
#   fly machines run --rm . -a todoleilao-soleon --process spider
#   fly machines run --rm . -a todoleilao-soleon --process banks-simple

app = "todoleilao-soleon"
primary_region = "gru"  # São Paulo — perto dos sites BR e do Supabase BR

[build]
  dockerfile = "Dockerfile"

# Sem [http_service] — app é puro batch.

[env]
  SOLEON_SITES = "all"
  GEOCODE_BATCH_LIMIT = "5000"

# SEM [processes] declarados. Multi-process do Fly criaria 1 machine
# por process group AUTOMATICAMENTE no deploy e iniciaria o CMD —
# desastroso pra batch jobs (queremos só rodar via fly machines run --rm
# disparado pelo GH Actions). Os comandos vivem nos workflows
# .github/workflows/cron-*.yml como argumento posicional após a imagem.

[[vm]]
  size = "shared-cpu-1x"
  memory = "1024mb"

[deploy]
  strategy = "immediate"
  # Sem auto-scale persistente. Machines são efêmeras: criadas pelo
  # `fly machines run --rm` quando o GH Actions dispara, autodestruídas.
  # `fly deploy` registra a imagem no registry mas não mantém machines
  # always-on — economiza ~12 × shared-cpu-1x@1GB = $66/mês ociosos.
  min_machines_running = 0
  max_unavailable = 1
