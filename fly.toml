# Fly.io app config — todoleilao-soleon
#
# Bootstrap:
#   fly launch --no-deploy --copy-config --name todoleilao-soleon
#   fly secrets set \
#       SUPABASE_DB_URL='postgresql://...' \
#       CPF_PEPPER='098c9c941...' \
#       -a todoleilao-soleon
#   fly deploy
#
# Primeira execução manual (smoke):
#   fly machines run --rm . -a todoleilao-soleon \
#       sh -c 'cd /app/scrapy_project && scrapy crawl soleon -a sites=2'
#
# Cron diário do spider (uma Machine que dispara todo dia):
#   fly machines run --schedule daily --process spider -a todoleilao-soleon
#
# Cron diário do geocoder (1 req/s ao Nominatim, ~25min pra ~1500 endereços):
#   fly machines run --schedule daily --process geocode -a todoleilao-soleon
#
# Os dois schedules são independentes — o geocode é idempotente e só
# processa endereços novos (geocoding_source IS NULL OR
# = 'municipality_centroid'), então pode rodar em qualquer horário.
# Convenção: spider de manhã (~08:00 UTC), geocode à noite (~02:00 UTC),
# pra não competir por shared CPU. Não há jeito declarativo de fixar
# horário no fly.toml — use --at no comando run, ou ajuste via cron
# externo (GitHub Actions) se latência precisar ser fina.

app = "todoleilao-soleon"
primary_region = "gru"  # São Paulo — perto dos sites BR e do Supabase BR

[build]
  dockerfile = "Dockerfile"

# Sem [http_service] — esse app não expõe porta, é puro batch.

[env]
  SOLEON_SITES = "5"
  GEOCODE_BATCH_LIMIT = "5000"

# Múltiplos roles (processes). A CLI do Fly seleciona qual rodar via
# `--process <name>` em `fly machines run`. Sem --process, usa "spider".
[processes]
  spider  = "sh -c 'cd /app/scrapy_project && scrapy crawl soleon -a sites=${SOLEON_SITES}'"
  geocode = "python /app/scripts/geocode_addresses.py --limit ${GEOCODE_BATCH_LIMIT}"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[deploy]
  strategy = "immediate"
