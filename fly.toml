# Fly.io app config — todoleilao-soleon
#
# App "main": providers SaaS, sites próprios, bancos leves, geocoder.
# Caixa vive em app separado (`fly.caixa.toml`) por exigir VM maior.
#
# Schedules: orquestrados por GitHub Actions cron (.github/workflows/cron-*.yml).
# `fly machines run --schedule` não permite hora fixa — gh actions resolve.
#
# Ephemeral: cada workflow dispara `fly machines run --rm` que cria
# machine, executa, autodestrói. Cobra só por segundos rodando.
#
# Bootstrap:
#   fly secrets set \
#       SUPABASE_DB_URL='postgresql://...' \
#       CPF_PEPPER='098c9c941...' \
#       -a todoleilao-soleon
#   fly deploy -a todoleilao-soleon
#
# Smoke manual:
#   fly machines run --rm . -a todoleilao-soleon --process spider
#   fly machines run --rm . -a todoleilao-soleon --process banks-simple

app = "todoleilao-soleon"
primary_region = "gru"  # São Paulo — perto dos sites BR e do Supabase BR

[build]
  dockerfile = "Dockerfile"

# Sem [http_service] — app é puro batch.

[env]
  SOLEON_SITES = "all"
  GEOCODE_BATCH_LIMIT = "5000"

# Processes. `--process <name>` em `fly machines run` seleciona qual.
# Sem --process, usa "spider".
[processes]
  spider              = "sh -c 'cd /app/scrapy_project && scrapy crawl soleon -a sites=${SOLEON_SITES}'"
  geocode             = "python /app/scripts/geocode_addresses.py --limit ${GEOCODE_BATCH_LIMIT}"
  providers-large     = "bash /app/scripts/run_batch_providers_large.sh"
  providers-medium    = "bash /app/scripts/run_batch_providers_medium.sh"
  proprio-html-batch  = "bash /app/scripts/run_batch_proprio_html.sh"
  banks-simple        = "bash /app/scripts/run_batch_banks_simple.sh"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1024mb"

[deploy]
  strategy = "immediate"
