# Provider: plataforma_leiloar (Leiloar — CakePHP backend)
# Recon piloto produzido por site-recon-pilot.
# Tenant amostrado: jussiaraleiloes.com (Jussiara Santos Ermano Sukiennik / DF).
# Pilot lot: encerrado/suspenso, com 2 bids públicos.

auctioneer_slug: "jussiara-santos-ermano-sukiennik"
platform_hint: "plataforma_leiloar"

# Listagem ATIVA: o site não tem rota GET por categoria; usa formulário POST
# `/externo/bens/pesquisaAvancada`. Categoria_id e status_id passados via
# `data[Bem][...]`. O spider de produção deve replicar o POST com seleção
# de imóveis (categorias 218,219,220,222,223,224,226,227,255) + status_id=1.
# Paginação via path: `/externo/bens/pesquisaAvancada/page:N`.
listing_active:
  url_pattern: "https://www.jussiaraleiloes.com/externo/bens/pesquisaAvancada"
  card_selector: "a[href*='/externo/lote/']"
  card_kind: css
  pagination:
    kind: path
    template: "/externo/bens/pesquisaAvancada/page:{page}"

# Listagem ENCERRADA/SUSPENSA/CANCELADA: mesmo formulário, status_id ∈
# {2,3,17,20,30,31}. NÃO há badge "ARREMATADO" no filtro do site —
# arrematados aparecem apenas via leilão pai (`/externo/leilao/{id}`),
# que mostra todos os lotes do leilão com badges <leilao-status>.
# Para Fase 1, usamos status_id=3 (CANCELADO) que devolveu 11 imóveis,
# o pilot_lot 5196 saiu daí (lote real está em SUSPENSO; leilão-pai
# foi CANCELADO).
listing_closed:
  url_pattern: "https://www.jussiaraleiloes.com/externo/bens/pesquisaAvancada"
  card_selector: "a[href*='/externo/lote/']"
  card_kind: css
  pagination:
    kind: path
    template: "/externo/bens/pesquisaAvancada/page:{page}"

detail:
  url_pattern: "https://www.jussiaraleiloes.com/externo/lote/{lote_id}"
  field_selectors:
    title:
      selector: "title::text"
      kind: css
    price_minimum:
      selector: "p:contains('Lance Mínimo')"
      kind: css
    price_market:
      selector: "p:contains('Avaliação')"
      kind: css
    address_block:
      selector: "div.col-12.text-center.txt-sm > b:contains('LOCAL:')"
      kind: css
    images:
      selector: "img[src*='arquivos/bem_foto']::attr(src)"
      kind: css
    documents:
      selector: "a[href*='/externo/bens/arquivos/']"
      kind: css
    description:
      selector: "h6:contains('DESCRIÇÃO COMPLETA') + p"
      kind: css
    rounds:
      selector: "b:contains('1º Leilão'), b:contains('2º Leilão')"
      kind: css
    bids:
      selector: "h6:contains('ÚLTIMOS LANCES SUPERADOS') ~ div table tbody tr"
      kind: css
    auction_status:
      selector: "div.badge.badge-danger"
      kind: css
