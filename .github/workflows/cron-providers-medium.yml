name: Providers Medium (2-day)

# 13:00 UTC (10:00 BRT) a cada 2 dias (cron */2 só no dia do mês — pode
# pular última semana). Cobre 7 providers SaaS médios.

on:
  schedule:
    - cron: '0 13 1-31/2 * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Fly machines run (providers-medium)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl machines run --rm \
            -a todoleilao-soleon \
            registry.fly.io/todoleilao-soleon:latest \
            bash /app/scripts/run_batch_providers_medium.sh
