name: Caixa Refazer (semanal)

# Domingo 04:00 UTC (01:00 BRT). Re-raspa lots Caixa órfãos
# (sem auction_round). Cobre UFs que não estão na rotação diária.

on:
  schedule:
    - cron: '0 4 * * 0'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Fly machines run (caixa-refazer)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_CAIXA }}
        run: |
          flyctl machines run --rm \
            -a todoleilao-caixa \
            registry.fly.io/todoleilao-caixa:latest \
            sh -c 'cd /app/scrapy_project && scrapy crawl caixa -a refazer_sem_data=true'
