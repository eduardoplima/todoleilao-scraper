name: Geocode 2x Daily

# 10:30 e 22:30 UTC. Promove endereços com municipality_centroid →
# nominatim (ponto exato), rate 1 req/s, cache em core.geocode_cache.

on:
  schedule:
    - cron: '30 10 * * *'
    - cron: '30 22 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Fly machines run (geocode)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl machines run --rm \
            -a todoleilao-soleon \
            -e GEOCODE_BATCH_LIMIT=5000 \
            registry.fly.io/todoleilao-soleon:latest \
            sh -c 'python /app/scripts/geocode_addresses.py --limit ${GEOCODE_BATCH_LIMIT}'
