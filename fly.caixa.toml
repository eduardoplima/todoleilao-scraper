# Fly.io app config — todoleilao-caixa
#
# App dedicado pra Caixa (única source que exige Playwright + 2GB RAM +
# execução longa 8-12h). Isolado pra OOM da Caixa não derrubar outros
# spiders rodando no app principal `todoleilao-soleon`.
#
# Bootstrap:
#   fly launch --no-deploy --copy-config --config fly.caixa.toml --name todoleilao-caixa
#   fly secrets set \
#       SUPABASE_DB_URL='postgresql://...' \
#       CPF_PEPPER='098c9c941...' \
#       -a todoleilao-caixa
#   fly deploy --config fly.caixa.toml -a todoleilao-caixa
#
# Smoke (UF pequena):
#   fly machines run --rm --config fly.caixa.toml -a todoleilao-caixa \
#       --process caixa-uf-day -e CAIXA_UF=AC
#
# Schedule: orquestrado por .github/workflows/cron-caixa-uf.yml
# (rotaciona UF por dia da semana: Seg=SP, Ter=RJ, Qua=MG, ...).

app = "todoleilao-caixa"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[env]
  # UF default. Sobrescrito por --env do `fly machines run` (GH Actions).
  CAIXA_UF = "AC"

# SEM [processes] — comandos vão nos workflows GH como argumento posicional.

[[vm]]
  size = "performance-1x"
  memory = "2048mb"

[deploy]
  strategy = "immediate"
  # Sem machines always-on. Ephemeral via GH Actions.
  min_machines_running = 0
  max_unavailable = 1
